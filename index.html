<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f9fc" />
    <title>Iris Voice</title>
    <link rel="icon" href="/iris/assets/brand/iris-app-icon-dark-192.png?v=172" type="image/png" />
    <link rel="apple-touch-icon" href="/iris/assets/brand/iris-app-icon-dark-192.png?v=172" />
    <link rel="manifest" href="/iris/manifest.json?v=172" />
    <link rel="stylesheet" href="/iris/styles.css?v=172" />
  </head>
  <body data-voice-state="idle" data-visual-state="idle" data-theme="minimal-white">
    <main class="terminal">
      <section class="home" aria-label="Iris voice home">
        <header class="topbar">
          <button id="detailsToggle" class="iconButton menuButton" type="button" aria-label="设置" data-i18n-aria-label="settings.title">
            <span class="systemGlyph" aria-hidden="true"><i></i><i></i><i></i></span>
          </button>
          <div class="ambientMark" aria-hidden="true"><span></span></div>
          <div class="identityBlock brandLockup">
            <p class="eyebrow brandName">Iris</p>
            <p class="statusLineCompact">
              <span id="statusIndicator" class="statusIndicator" aria-label="状态：在线"></span>
              <span id="stateLabel" class="topStatus" data-i18n="status.online">在线</span>
            </p>
          </div>
        </header>

        <section class="conversationShell" aria-label="Iris conversation">
          <div id="conversationStream" class="conversationStream" role="log" aria-live="polite">
            <article class="message assistant" data-kind="welcome">
              <p class="messageMeta">Iris</p>
              <p class="messageText" data-i18n="welcome.message">我在。你可以直接说，也可以把文件发给我。</p>
            </article>
          </div>

          <section class="dialogueCard captionFloat" aria-label="Iris dialogue">
            <p id="subtitleSpeaker" class="dialogueLabel">IRIS</p>
            <div id="dialogueScroll" class="dialogueScroll" role="log" aria-live="polite">
              <p id="subtitleText" class="dialogueText" data-i18n="voice.idleText">我在。你可以直接说。</p>
            </div>
          </section>
        </section>

        <section class="controls dock unifiedComposer" aria-label="message composer">
          <p id="voiceInputStatus" class="voiceInputStatus" aria-live="polite" data-i18n="voice.inputting">正在语音输入</p>
          <input id="documentPdfInput" class="fileInput" type="file" accept="application/pdf,.pdf" />
          <button id="documentUploadButton" class="dockIcon attachButton" type="button" aria-label="上传文件" title="上传文件" data-i18n-aria-label="action.uploadFile" data-i18n-title="action.uploadFile">
            <span class="attachPlus" aria-hidden="true">+</span>
          </button>
          <div class="composerField">
            <div id="documentContextBar" class="documentContextBar" hidden>
              <span id="documentStatus" data-i18n="document.disconnected">未连接文件</span>
              <button id="documentSummarizeButton" type="button" disabled data-i18n="document.summary">摘要</button>
            </div>
            <textarea id="manualInput" rows="1" autocomplete="off" placeholder="输入内容..." data-i18n-placeholder="composer.placeholder"></textarea>
            <button id="dockMicButton" class="dockIcon dockMic" type="button" aria-label="语音输入" data-i18n-aria-label="action.voiceInput">
              <span class="micGlyph" aria-hidden="true"></span>
            </button>
          </div>
          <button id="manualSend" class="dockIcon sendButton" type="button" aria-label="发送" data-i18n-aria-label="action.send">↑</button>
          <button id="mainButton" class="primary dockInput srOnly" type="button" hidden data-i18n="voice.buttonIdle">问问 Iris</button>
          <textarea id="documentQuestionInput" class="srOnly" rows="1"></textarea>
          <button id="documentAskButton" class="srOnly" type="button" disabled data-i18n="document.ask">追问</button>
          <p id="documentAnswer" class="srOnly"> </p>
        </section>
      </section>

      <section id="accessGate" class="accessGate" aria-label="Iris access" hidden>
        <div class="accessQuickControls" aria-label="quick settings">
          <button id="accessThemeToggle" class="accessQuickButton" type="button" aria-label="切换主题" title="切换主题" data-i18n-aria-label="action.themeCycle" data-i18n-title="action.themeCycle">
            <span class="accessThemeGlyph" aria-hidden="true"><i></i><i></i><i></i></span>
          </button>
          <button id="accessLanguageToggle" class="accessQuickButton accessLanguageButton" type="button" aria-label="Switch language" title="Switch language">EN</button>
        </div>
        <div class="accessBackdrop" aria-hidden="true">
          <span class="accessHalo accessHaloOne"></span>
          <span class="accessHalo accessHaloTwo"></span>
        </div>
        <div class="accessPanel">
          <span class="accessMark" aria-hidden="true"></span>
          <p class="eyebrow" data-i18n="access.eyebrow">PRIVATE ACCESS</p>
          <h1>Iris</h1>
          <p class="accessCopy" data-i18n="access.copy">输入访问密钥进入。Iris 只会在当前浏览器会话中保存短期登录令牌。</p>
          <form id="accessForm" class="accessForm">
            <input id="accessTokenInput" type="password" autocomplete="current-password" placeholder="访问密钥" aria-label="访问密钥" data-i18n-placeholder="access.placeholder" data-i18n-aria-label="access.placeholder" />
            <button id="accessSubmitButton" type="submit" data-i18n="access.submit">进入</button>
          </form>
          <p id="accessStatus" class="settingHint"> </p>
        </div>
      </section>

      <aside id="detailSheet" class="detailSheet" aria-label="Iris settings" aria-hidden="true" data-i18n-aria-label="settings.aria">
        <div class="sheetHeader">
          <div class="sheetTitleLockup">
            <span class="sheetGlyph" aria-hidden="true"></span>
            <div>
              <p class="eyebrow sheetEyebrow" data-i18n="settings.eyebrow">SETTINGS</p>
              <h2 data-i18n="settings.title">设置</h2>
            </div>
          </div>
          <button id="closeDetails" class="iconButton closeButton" type="button" aria-label="关闭" data-i18n-aria-label="action.close">×</button>
        </div>

        <div class="settingsList">
        <details class="settingsGroup navGroup" open>
          <summary class="navSummary">
            <span class="navIcon linkIcon" aria-hidden="true"></span>
            <span class="navCopy">
              <span class="navTitle" data-i18n="settings.connection">连接</span>
              <span class="navSub" data-i18n="settings.connectionSub">重连 · 停止</span>
            </span>
          </summary>
          <div class="groupBody maintenanceGrid">
            <button id="reconnectButton" type="button" data-i18n="action.reconnect">重连</button>
            <button id="stopButton" type="button" data-i18n="action.stop">停止</button>
          </div>
        </details>

        <details class="settingsGroup navGroup">
          <summary class="navSummary">
            <span class="navIcon paletteIcon" aria-hidden="true"></span>
            <span class="navCopy">
              <span class="navTitle" data-i18n="settings.appearance">外观</span>
              <span class="navSub" data-i18n="settings.appearanceSub">主题 · 模式</span>
            </span>
          </summary>
          <div id="themePicker" class="groupBody themePicker" role="radiogroup" aria-label="界面主题" data-i18n-aria-label="settings.themeAria">
            <button type="button" class="themeOption" data-theme-choice="minimal-white" role="radio" aria-checked="true">
              <span class="themeSwatch swatchWhite" aria-hidden="true"></span>
              <span>极简白</span>
            </button>
            <button type="button" class="themeOption" data-theme-choice="soft-gray" role="radio" aria-checked="false">
              <span class="themeSwatch swatchGray" aria-hidden="true"></span>
              <span>素雅灰</span>
            </button>
            <button type="button" class="themeOption" data-theme-choice="classic-blue" role="radio" aria-checked="false">
              <span class="themeSwatch swatchBlue" aria-hidden="true"></span>
              <span>经典蓝</span>
            </button>
            <button type="button" class="themeOption" data-theme-choice="pure-black" role="radio" aria-checked="false">
              <span class="themeSwatch swatchBlack" aria-hidden="true"></span>
              <span>极致黑</span>
            </button>
            <button type="button" class="themeOption" data-theme-choice="aurora-glass" role="radio" aria-checked="false">
              <span class="themeSwatch swatchAurora" aria-hidden="true"></span>
              <span>流光玻璃</span>
            </button>
          </div>
        </details>

        <details class="settingsGroup navGroup languageGroup">
          <summary class="navSummary">
            <span class="navIcon languageIcon" aria-hidden="true"></span>
            <span class="navCopy">
              <span class="navTitle" data-i18n="settings.language">语言</span>
              <span id="languageStatus" class="navSub" data-i18n="settings.languageSub">中文 · English</span>
            </span>
          </summary>
          <div id="languagePicker" class="groupBody languagePicker" role="radiogroup" aria-label="界面语言" data-i18n-aria-label="settings.languageAria">
            <button type="button" class="languageOption" data-language-choice="zh" role="radio" aria-checked="true">中文</button>
            <button type="button" class="languageOption" data-language-choice="en" role="radio" aria-checked="false">English</button>
          </div>
        </details>

        <details class="settingsGroup navGroup modelGroup">
          <summary class="navSummary">
            <span class="navIcon cubeIcon" aria-hidden="true"></span>
            <span class="navCopy">
              <span class="navTitle" data-i18n="settings.model">模型</span>
              <span id="modelStatus" class="navSub">读取当前模型中。</span>
            </span>
          </summary>
          <div class="groupBody settingRow">
            <label for="modelSelect" data-i18n="settings.modelLabel">DeepSeek API 模型</label>
            <select id="modelSelect" aria-label="DeepSeek API 模型">
              <option value="">正在加载</option>
            </select>
          </div>
        </details>

        <details class="settingsGroup navGroup memoryGroup">
          <summary class="navSummary">
            <span class="navIcon bookIcon" aria-hidden="true"></span>
            <span class="navCopy">
              <span class="navTitle" data-i18n="settings.memory">记忆</span>
              <span id="memoryStatus" class="navSub" data-i18n="settings.memorySub">你的偏好与对话记忆</span>
            </span>
          </summary>
          <div class="groupBody memoryControls">
          <div class="groupHeader">
            <button id="memoryRefreshButton" type="button" data-i18n="action.refresh">刷新</button>
          </div>
          <div class="memorySearchRow">
            <input id="memorySearchInput" type="search" autocomplete="off" inputmode="search" placeholder="搜索记忆" aria-label="搜索记忆" data-i18n-placeholder="memory.search" data-i18n-aria-label="memory.search" />
            <button id="memorySearchClearButton" type="button" aria-label="清空记忆搜索" data-i18n="action.clear" data-i18n-aria-label="memory.clearSearch">清除</button>
          </div>
          <div id="memoryList" class="memoryList" aria-live="polite"></div>
          </div>
        </details>

        <details class="settingsGroup navGroup soundGroup">
          <summary class="navSummary">
            <span class="navIcon voiceIcon" aria-hidden="true"></span>
            <span class="navCopy">
              <span class="navTitle" data-i18n="settings.sound">声音</span>
              <span class="navSub" data-i18n="settings.soundSub">语音 · 播放 · 麦克风</span>
            </span>
          </summary>
          <div class="groupBody collapsibleBody">
          <div class="settingRow">
            <label for="voiceProfileSelect" data-i18n="settings.voiceLabel">Edge TTS 音色</label>
            <select id="voiceProfileSelect">
              <option value="jarvis_taiwan_sweet_female" selected>台湾甜妹</option>
              <option value="jarvis_taiwan_bright_female">台湾元气</option>
              <option value="jarvis_mainland_soft_female">温柔普通话</option>
              <option value="jarvis_mainland_lively_female">活泼普通话</option>
              <option value="jarvis_liaoning_playful_female">东北小贝</option>
              <option value="jarvis_shaanxi_bright_female">陕西小妮</option>
              <option value="jarvis_hongkong_friendly_female">港风女声</option>
            </select>
          </div>
          <div class="maintenanceGrid">
            <button id="micButton" type="button" data-i18n="action.microphone">麦克风</button>
            <button id="speakerButton" type="button" data-i18n="action.muteSpeaker">静音扬声器</button>
          </div>
          <div class="audibilityBox">
            <div>
              <p class="audibilityTitle" data-i18n="tts.audibilityTitle">发声听感确认</p>
              <p id="webTtsAudibilityStatus" class="settingHint" data-i18n="tts.unconfirmed">未确认</p>
            </div>
            <div class="routeBox">
              <p class="audibilityTitle" data-i18n="tts.routeTitle">最近播报链路</p>
              <p id="webTtsRouteStatus" class="settingHint" data-i18n="tts.noRoute">还没有播报记录。</p>
            </div>
            <div class="audibilityActions">
              <button id="webTtsTestButton" type="button" data-i18n="tts.test">测试播报</button>
              <button id="webTtsHeardButton" type="button" data-i18n="tts.heard">我听到了</button>
              <button id="webTtsNotHeardButton" type="button" data-i18n="tts.notHeard">没听到</button>
              <button id="webTtsSyncButton" type="button" data-i18n="tts.sync">同步记录</button>
            </div>
          </div>
          </div>
        </details>

        <details class="settingsGroup navGroup debugDetails">
          <summary class="navSummary">
            <span class="navIcon gearIcon" aria-hidden="true"></span>
            <span class="navCopy">
              <span class="navTitle" data-i18n="settings.advanced">高级</span>
              <span class="navSub" data-i18n="settings.advancedSub">开发者选项与诊断</span>
            </span>
          </summary>
          <div class="groupBody">
          <section class="panel">
          <div class="panelHeader">
            <span data-i18n="debug.userSaid">我说</span>
            <span id="vadLevel">0.000</span>
          </div>
          <p id="sttHint" class="hint"> </p>
          <p id="partialText" class="muted"> </p>
          <p id="finalText"> </p>
          </section>

          <section class="panel">
          <div class="panelHeader">
            <span>Iris</span>
            <span id="turnLabel"> </span>
          </div>
          <p id="replyText"> </p>
          </section>

          <section class="log" id="eventLog" aria-label="event log"></section>
          </div>
        </details>
        </div>
      </aside>
    </main>
    <script src="/iris/public-config.js?v=172"></script>
    <script src="/iris/app.js?v=172"></script>
  </body>
</html>
